name: C/C++ CI Build Check

# Workflow này sẽ chạy mỗi khi bạn git push lên nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux của GitHub

    steps:
    - name: Tải code từ kho về máy ảo
      uses: actions/checkout@v3

    - name: Cài đặt trình biên dịch g++
      run: sudo apt-get install -y g++

    - name: Kiểm tra biên dịch các file trong thư mục Homework
      run: |
        # Kiểm tra xem thư mục Homework có tồn tại trên kho không
        if [ -d "Homework" ]; then
          # Tìm tất cả file .cpp TRONG THƯ MỤC Homework và các thư mục con
          for file in $(find Homework -name "*.cpp"); do
            echo "Đang test build: $file"
            # Cờ -fsyntax-only để test lỗi, -Wall để cảnh báo code bẩn, || exit 1 để đánh rớt workflow nếu có lỗi
            g++ -fsyntax-only "$file" -Wall || exit 1
          done
          echo "✅ Tất cả các bài tập đều build thành công!"
        else
          echo "Thư mục Homework trống hoặc chưa tồn tại, bỏ qua bước test."
        fi